description: >-
  Concentrix is a global technology and services leader providing customer
  experience (CX) management, digital transformation, and technology
  consulting across approximately 2,000 brands worldwide. Its product
  suite spans the iX product line (including iX Hello and iX Hero
  agentic AI assistants) and the Catalyst experience transformation and
  technology consultancy. Concentrix does not publish a public developer
  API; the iX product suite and Catalyst services are delivered via
  managed engagements and enterprise integrations rather than a
  self-service developer portal.
